<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯店訂房平台</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #abc4eb;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        h1 {
            text-align: center;
            padding: 25px;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        /* 搜尋區 */
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;

            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: end;

            box-shadow: 0 3px 10px rgba(0, 0, 0, .1);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            width: 180px;
        }

        /* 房型區 */
        .room-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .room-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0, 0, 0, .15);
        }

        .room-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .room-info {
            padding: 15px;
            text-align: center;
        }

        .room-info h3 {
            margin-bottom: 10px;
        }

        .room-info p {
            margin-bottom: 8px;
        }

        .book-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #3874b8;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 16px;

        }

        .book-btn:hover {
            background: #005fd1;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);

            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 450px;
            background: white;
            border-radius: 15px;
            padding: 25px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .detail {
            margin-bottom: 10px;
        }

        .modal-buttons {
            margin-top: 20px;

            display: flex;
            gap: 10px;
        }

        .confirm-btn,
        .cancel-btn {
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .confirm-btn {
            background: green;
        }

        .cancel-btn {
            background: crimson;
        }

        .empty-msg {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            color: gray;
        }

        /* =========================
   訂房成功視窗
========================= */

        .success-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);

            display: none;

            justify-content: center;
            align-items: center;
        }

        .success-content {

            width: 420px;

            background: white;

            padding: 30px;

            border-radius: 15px;

            text-align: center;

            animation: showModal .3s ease;
        }

        .success-icon {
            font-size: 70px;
            margin-bottom: 15px;
        }

        .success-content h2 {
            color: green;
            margin-bottom: 15px;
        }

        .success-content p {
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .success-content button {
            width: 100%;
            padding: 12px;
            border: none;
            background: green;
            color: white;
            cursor: pointer;
            font-size: 16px;
            border-radius: 8px;
        }

        @keyframes showModal {
            from {
                transform: scale(.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <h1>🏨 飯店訂房平台</h1>

    <div class="container">

        <!-- 搜尋區 -->
        <div class="search-box">
            <div class="form-group">
                <label>入住日期</label>
                <input type="date" id="checkIn">
            </div>
            <div class="form-group">
                <label>退房日期</label>
                <input type="date" id="checkOut">
            </div>
            <div class="form-group">
                <label>入住人數</label>
                <select id="guestCount">
                    <option value="1">1人</option>
                    <option value="2">2人</option>
                    <option value="3">3人</option>
                    <option value="4">4人</option>
                    <option value="5">5人</option>
                    <option value="6">6人</option>
                </select>
            </div>

        </div>

        <!-- 房型列表 -->
        <div class="room-list" id="roomList"></div>

    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>訂房明細</h2>
            <div class="detail" id="detailRoom"></div>
            <div class="detail" id="detailDate"></div>
            <div class="detail" id="detailDays"></div>
            <div class="detail" id="detailGuest"></div>
            <div class="detail" id="detailPrice"></div>
            <div class="modal-buttons">
                <button class="confirm-btn" id="confirmBtn">確認預訂</button>
                <button class="cancel-btn" id="cancelBtn">取消</button>
            </div>
        </div>
        <!-- 訂房成功 Modal -->
        <div class="success-modal" id="successModal">
            <div class="success-content">
                <div class="success-icon">✅</div>
                <h2>訂房成功</h2>
                <p id="successText"></p>
                <button id="finishBtn">完成</button>
            </div>
        </div>
    </div>

    <script>
        /* =========================
           房型資料
        ========================= */
        const rooms = [
            {
                id: 1,
                name: "豪華雙人房",
                price: 3200,
                maxGuest: 2,
                image: "https://picsum.photos/500/300?1"
            },
            {
                id: 2,
                name: "家庭四人房",
                price: 5200,
                maxGuest: 4,
                image: "https://picsum.photos/500/300?2"
            },
            {
                id: 3,
                name: "商務套房",
                price: 4500,
                maxGuest: 3,
                image: "https://picsum.photos/500/300?3"
            },
            {
                id: 4,
                name: "總統套房",
                price: 9800,
                maxGuest: 6,
                image: "https://picsum.photos/500/300?4"
            }
        ];

        const roomList = document.querySelector("#roomList");
        const guestCount = document.querySelector("#guestCount");

        const checkIn = document.querySelector("#checkIn");
        const checkOut = document.querySelector("#checkOut");

        const modal = document.querySelector("#modal");
        const successModal = document.querySelector("#successModal");
        const successText = document.querySelector("#successText");

        let currentRoom = null;

        /* =========================
           房型渲染
        ========================= */

        function renderRooms() {

            roomList.innerHTML = "";
            const guests = Number(guestCount.value);
            const filteredRooms = rooms.filter(room =>
                room.maxGuest >= guests
            );

            if (filteredRooms.length === 0) {
                roomList.innerHTML =
                    `<div class="empty-msg">
                        找不到符合條件的房型
                    </div>`;
                return;
            }

            filteredRooms.forEach(room => {

                roomList.innerHTML += `
                <div class="room-card">
                    <img src="${room.image}">
                    <div class="room-info">
                        <h3>${room.name}</h3>
                        <p>💰 每晚 NT$${room.price}</p>
                        <p>👤 人數上限 ${room.maxGuest} 人</p>
                        <button
                            class="book-btn"
                            onclick="openModal(${room.id})">立即預訂
                        </button>
                    </div>
                </div>
                `;
            });
        }
        renderRooms();

        /* =========================
           即時篩選
        ========================= */
        guestCount.addEventListener( "change",renderRooms);
        /* =========================
           日期驗證
        ========================= */
        function validateDate() {

            if (
                checkIn.value && checkOut.value && checkOut.value < checkIn.value
            ) {
                alert("退房日期不可早於入住日期");

                checkOut.value = "";
                return false;
            }

            return true;
        }

        checkIn.addEventListener( "change",validateDate);

        checkOut.addEventListener( "change", validateDate);

        /* =========================
           開啟預訂視窗
        ========================= */
        function openModal(roomId) {

            if (!checkIn.value || !checkOut.value) {
                alert("請先選擇入住與退房日期");
                return;
            }

            if (!validateDate()) return;
            currentRoom =
                rooms.find(
                    room => room.id === roomId
                );

            const start = new Date(checkIn.value);
            const end = new Date(checkOut.value);
            const days = (end - start) / (1000 * 60 * 60 * 24);
            const total = days * currentRoom.price;

            document.querySelector("#detailRoom").innerHTML = `房型：${currentRoom.name}`;
            document.querySelector("#detailDate").innerHTML = `日期：${checkIn.value}  ~ ${checkOut.value}`;
            document.querySelector("#detailDays").innerHTML = `住宿天數：${days} 晚`;
            document.querySelector("#detailGuest").innerHTML = `入住人數：${guestCount.value} 人`;
            document.querySelector("#detailPrice").innerHTML = `總價：NT$${total}`;

            modal.style.display = "flex";
        }

        /* =========================
           關閉視窗
        ========================= */
        document.querySelector( "#cancelBtn").addEventListener("click",() => {
                modal.style.display = "none";
            }
        );

        /* =========================
           確認預訂
        ========================= */
        document.querySelector("#confirmBtn").addEventListener("click", () => {

            const start = new Date(checkIn.value);
            const end = new Date(checkOut.value);
            const days = (end - start) / (1000 * 60 * 60 * 24);
            const total = days * currentRoom.price;

            modal.style.display = "none";
            successText.innerHTML = `
            房型：${currentRoom.name}<br>
            入住人數：${guestCount.value} 人<br>
            住宿天數：${days} 晚<br>
            總金額：NT$${total}
        `;
            successModal.style.display = "flex";
        }
        );
        document.querySelector("#finishBtn").addEventListener("click", () => {

            successModal.style.display = "none";
            checkIn.value = "";
            checkOut.value = "";

            renderRooms();
        }
        );
    </script>

</body>

</html>
