  <h1>飯店訂房網站</h1>

  <p>
    這是一個模擬飯店訂房系統的網站，
    提供房型瀏覽、日期選擇與總價計算功能。
  </p>

  <h2>功能特色</h2>
  <ul>
    <li>房型列表</li>
    <li>入住日期選擇</li>
    <li>退房日期選擇</li>
    <li>住宿天數計算</li>
    <li>總價即時計算</li>
    <li>訂房成功提示</li>
  </ul>

  <h2>使用技術</h2>
  <p>HTML、CSS、JavaScript</p>
